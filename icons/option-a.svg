<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00cfff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00cfff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00eeff"/>
      <stop offset="100%" stop-color="#0055ff"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bgA)"/>
  <!-- 光晕 -->
  <ellipse cx="256" cy="256" rx="200" ry="200" fill="url(#glowA)"/>
  <!-- 隧道同心椭圆 -->
  <ellipse cx="256" cy="256" rx="190" ry="110" fill="none" stroke="#00cfff" stroke-width="3" opacity="0.25"/>
  <ellipse cx="256" cy="256" rx="155" ry="88" fill="none" stroke="#00cfff" stroke-width="4" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="118" ry="67" fill="none" stroke="#00cfff" stroke-width="6" opacity="0.6"/>
  <ellipse cx="256" cy="256" rx="80" ry="46" fill="none" stroke="#00eeff" stroke-width="8" opacity="0.85"/>
  <ellipse cx="256" cy="256" rx="42" ry="24" fill="none" stroke="#00eeff" stroke-width="10"/>
  <!-- 中心点 -->
  <circle cx="256" cy="256" r="10" fill="#00eeff"/>
  <circle cx="256" cy="256" r="5" fill="white"/>
  <!-- 顶部弧线（隧道感） -->
  <path d="M 80 256 Q 80 90 256 90 Q 432 90 432 256" fill="none" stroke="url(#ringA)" stroke-width="3" opacity="0.4"/>
  <!-- 底部弧线 -->
  <path d="M 80 256 Q 80 422 256 422 Q 432 422 432 256" fill="none" stroke="url(#ringA)" stroke-width="3" opacity="0.4"/>
</svg>
