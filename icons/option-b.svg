<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0a1e"/>
      <stop offset="100%" stop-color="#1a0d3d"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bgB)"/>
  <!-- 中心光晕 -->
  <circle cx="256" cy="256" r="180" fill="url(#centerGlow)"/>
  <!-- 外层六边形 -->
  <polygon points="256,72 416,166 416,346 256,440 96,346 96,166"
    fill="none" stroke="url(#hexGrad)" stroke-width="6" opacity="0.7"/>
  <!-- 内层六边形 -->
  <polygon points="256,130 374,198 374,314 256,382 138,314 138,198"
    fill="none" stroke="url(#hexGrad)" stroke-width="3" opacity="0.4"/>
  <!-- 六个顶点的节点 -->
  <circle cx="256" cy="72" r="10" fill="#a855f7"/>
  <circle cx="416" cy="166" r="10" fill="#a855f7"/>
  <circle cx="416" cy="346" r="10" fill="#a855f7"/>
  <circle cx="256" cy="440" r="10" fill="#a855f7"/>
  <circle cx="96" cy="346" r="10" fill="#a855f7"/>
  <circle cx="96" cy="166" r="10" fill="#a855f7"/>
  <!-- 连接线到中心 -->
  <line x1="256" y1="72" x2="256" y2="180" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
  <line x1="416" y1="166" x2="320" y2="210" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
  <line x1="416" y1="346" x2="320" y2="302" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
  <line x1="256" y1="440" x2="256" y2="332" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
  <line x1="96" y1="346" x2="192" y2="302" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
  <line x1="96" y1="166" x2="192" y2="210" stroke="#c084fc" stroke-width="1.5" opacity="0.4"/>
  <!-- 中心圆 -->
  <circle cx="256" cy="256" r="52" fill="none" stroke="url(#hexGrad)" stroke-width="5"/>
  <circle cx="256" cy="256" r="28" fill="url(#hexGrad)" opacity="0.9"/>
  <!-- 中心 F 字 -->
  <text x="248" y="272" font-family="Arial" font-weight="bold" font-size="36" fill="white">F</text>
</svg>
