<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c00"/>
      <stop offset="100%" stop-color="#1a1400"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glowD">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="110" fill="url(#bgD)"/>
  <!-- 外盾形 -->
  <path d="M256 72 L400 130 L400 278 Q400 380 256 450 Q112 380 112 278 L112 130 Z"
    fill="none" stroke="url(#shieldGrad)" stroke-width="7" stroke-linejoin="round" filter="url(#glowD)" opacity="0.9"/>
  <!-- 内盾形 -->
  <path d="M256 118 L368 165 L368 275 Q368 352 256 410 Q144 352 144 275 L144 165 Z"
    fill="none" stroke="url(#innerGrad)" stroke-width="3" stroke-linejoin="round" opacity="0.4"/>
  <!-- F 字主体 -->
  <rect x="196" y="180" width="120" height="18" rx="4" fill="url(#innerGrad)"/>
  <rect x="196" y="180" width="18" height="150" rx="4" fill="url(#innerGrad)"/>
  <rect x="196" y="248" width="90" height="16" rx="4" fill="url(#innerGrad)"/>
  <!-- 顶部装饰线 -->
  <line x1="200" y1="98" x2="312" y2="98" stroke="#fbbf24" stroke-width="2" opacity="0.4"/>
  <circle cx="256" cy="92" r="5" fill="#f59e0b" filter="url(#glowD)"/>
</svg>
