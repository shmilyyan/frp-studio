name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            build_cmd: pnpm build:linux
          - os: windows-latest
            platform: windows
            build_cmd: pnpm build:win
          - os: macos-latest
            platform: macos
            build_cmd: pnpm build:mac
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm typecheck

      - name: Determine version type
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          else
            BASE_VERSION=$(node -p "require('./package.json').version" | cut -d'+' -f1)
            DATE=$(date +%Y%m%d)
            COMMIT_HASH=$(git rev-parse --short=7 HEAD)
            VERSION="${BASE_VERSION}+${DATE}.${COMMIT_HASH}"
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          fi

      - name: Update package.json version
        run: |
          if [ "${{ steps.version.outputs.IS_TAG }}" == "false" ]; then
            node -e "const pkg = require('./package.json'); pkg.version = '${{ steps.version.outputs.VERSION }}'; require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));"
          fi

      - name: Build
        run: ${{ matrix.build_cmd }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/win-unpacked
            dist/mac
            dist/linux-unpacked

  create-portables:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version type
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
            echo "PRERELEASE=false" >> $GITHUB_OUTPUT
          else
            BASE_VERSION=$(node -p "require('./package.json').version" | cut -d'+' -f1)
            DATE=$(date +%Y%m%d)
            COMMIT_HASH=$(git rev-parse --short=7 HEAD)
            VERSION="${BASE_VERSION}+${DATE}.${COMMIT_HASH}"
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
            echo "PRERELEASE=true" >> $GITHUB_OUTPUT
          fi

      - name: Create portable Windows zip
        run: |
          cd artifacts/dist-windows
          if [ -d "win-unpacked" ]; then
            cd win-unpacked
            zip -r ../../Frper-portable-${{ steps.version.outputs.VERSION }}-win.zip .
            cd ../..
          fi

      - name: Create portable macOS zip
        run: |
          cd artifacts/dist-macos
          if [ -d "mac" ]; then
            cd mac
            zip -r ../../Frper-portable-${{ steps.version.outputs.VERSION }}-mac.zip .
            cd ../..
          fi

      - name: Create portable Linux zip
        run: |
          cd artifacts/dist-linux
          if [ -d "linux-unpacked" ]; then
            cd linux-unpacked
            zip -r ../../Frper-portable-${{ steps.version.outputs.VERSION }}-linux.zip .
            cd ../..
          fi

      - name: Collect all artifacts
        run: |
          mkdir -p release
          find artifacts -name "*.exe" -exec cp {} release/ \;
          find artifacts -name "*.dmg" -exec cp {} release/ \;
          find artifacts -name "*.AppImage" -exec cp {} release/ \;
          find . -name "Frper-portable-*.zip" -exec cp {} release/ \;
          ls -lh release/

      - name: Generate release notes
        shell: bash
        run: |
          if [ "${{ steps.version.outputs.IS_TAG }}" == "true" ]; then
            LAST_TAG=$(git describe --tags --abbrev=0 HEAD^)
            echo "## What's Changed" >> release_notes.md
            git log ${LAST_TAG}..HEAD --pretty=format:"- %s" >> release_notes.md
          else
            echo "## Build Information" >> release_notes.md
            echo "" >> release_notes.md
            echo "**Version:** ${{ steps.version.outputs.VERSION }}" >> release_notes.md
            echo "**Commit:** ${{ github.sha }}" >> release_notes.md
            echo "" >> release_notes.md
            echo "### Latest Changes" >> release_notes.md
            git log -1 --pretty=format:"- %s%n%n%b" >> release_notes.md
          fi
          echo "### Download" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Windows Installer:** \`Frper Setup *.exe\`" >> release_notes.md
          echo "- **Windows Portable:** \`Frper-portable-*-win.zip\`" >> release_notes.md
          echo "- **macOS:** \`Frper-*.dmg\`" >> release_notes.md
          echo "- **Linux:** \`Frper-*.AppImage\`" >> release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ steps.version.outputs.PRERELEASE }}
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
